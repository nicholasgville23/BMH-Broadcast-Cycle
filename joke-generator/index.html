<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1>😂 Joke Generator</h1>
            <p class="subtitle">Get a laugh with random jokes from the internet!</p>
        </header>

        <main class="main-content">
            <!-- Joke Display Card -->
            <div class="joke-card">
                <div class="joke-type" id="jokeType">Loading...</div>
                <div class="joke-content" id="jokeContent">
                    <p>Click the button below to get a joke!</p>
                </div>
                <div class="joke-setup" id="jokeSetup" style="display: none;"></div>
            </div>

            <!-- Controls Section -->
            <div class="controls">
                <button id="generateBtn" class="btn btn-primary">Generate Joke</button>
                <button id="shareBtn" class="btn btn-secondary">Share</button>
                <button id="copyBtn" class="btn btn-secondary">Copy</button>
            </div>

            <!-- Category Filter -->
            <div class="filters">
                <label for="categorySelect">Category:</label>
                <select id="categorySelect" class="select-dropdown">
                    <option value="any">Any Category</option>
                    <option value="general">General</option>
                    <option value="programming">Programming</option>
                    <option value="knock-knock">Knock Knock</option>
                </select>
                <span class="filter-info" id="filterInfo">API: JokeAPI</span>
            </div>

            <!-- Loading Indicator -->
            <div class="loading" id="loadingIndicator" style="display: none;">
                <div class="spinner"></div>
                <p>Fetching a joke...</p>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMessage" style="display: none;"></div>

            <!-- Joke History -->
            <div class="history-section">
                <h2>Recent Jokes</h2>
                <ul class="history-list" id="historyList">
                    <li class="empty-state">No jokes yet. Generate your first one!</li>
                </ul>
                <button id="clearHistoryBtn" class="btn btn-tertiary" style="display: none;">Clear History</button>
            </div>
        </main>

        <footer class="footer">
            <p>Powered by <a href="https://jokeapi.dev/" target="_blank">JokeAPI</a></p>
            <p>&copy; 2026 Joke Generator. Have fun!</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
